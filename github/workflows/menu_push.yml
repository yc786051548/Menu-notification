name: 菜单推送

on:
  schedule:
    # GitHub Actions 用 UTC 时间，北京时间 = UTC + 8
    - cron: '25 1 * * 1-5'    # 北京 09:25 周一到周五 → 早餐
    - cron: '55 3 * * 1-5'    # 北京 11:55 周一到周五 → 午餐
    - cron: '25 10 * * 1-5'   # 北京 18:25 周一到周五 → 晚餐
  workflow_dispatch:
    inputs:
      meal:
        description: '手动推送哪一餐'
        required: true
        default: 'lunch'
        type: choice
        options: [breakfast, lunch, dinner]

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: 选择餐次
        id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "meal=${{ inputs.meal }}" >> $GITHUB_OUTPUT
          else
            # 根据当前 UTC 小时判断要推哪一餐
            HOUR=$(date -u +%H)
            case $HOUR in
              01) echo "meal=breakfast" >> $GITHUB_OUTPUT ;;
              03) echo "meal=lunch" >> $GITHUB_OUTPUT ;;
              10) echo "meal=dinner" >> $GITHUB_OUTPUT ;;
              *)  echo "meal=lunch" >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: 推送菜单
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          TZ: Asia/Shanghai
        run: python push_menu.py ${{ steps.pick.outputs.meal }}
